<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SPCET Portal | Secure Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Light decorative background blobs */
        .bg-decorations {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .circle-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: floatSlow 25s infinite alternate ease-in-out;
        }

        .circle-1 {
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, #c8e6d9, #a5d6a7);
            top: -25vh;
            left: -20vw;
        }

        .circle-2 {
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, #ffe0b5, #ffcc80);
            bottom: -20vh;
            right: -15vw;
            animation-duration: 20s;
        }

        @keyframes floatSlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.25; }
            100% { transform: translate(5%, 6%) scale(1.12); opacity: 0.4; }
        }

        /* Main Card - Clean White Glassmorphism Light */
        .card-container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            border: 1px solid rgba(45, 106, 79, 0.15);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s;
            overflow: hidden;
        }

        .card-container:hover {
            box-shadow: 0 25px 45px -15px rgba(0, 0, 0, 0.12);
        }

        /* SPCET Portal Header - Light Green Theme */
        .portal-header {
            background: linear-gradient(115deg, #ffffff 0%, #f8fbf9 100%);
            padding: 1.3rem 2rem;
            text-align: center;
            border-bottom: 2px solid #2d6a4f;
            position: relative;
        }

        .portal-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #1a4d2e;
        }

        .portal-header h1 span {
            color: #d4a017;
        }

        .portal-header p {
            font-size: 0.7rem;
            color: #5a7a62;
            margin-top: 6px;
            letter-spacing: 0.3px;
            font-weight: 500;
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            padding: 1.8rem 2rem 0.8rem 2rem;
        }

        .brand-badge {
            background: linear-gradient(145deg, #f0f7f3, #e8f0ea);
            width: 75px;
            height: 75px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            box-shadow: 0 6px 14px rgba(45, 106, 79, 0.08);
            border: 1px solid rgba(45, 106, 79, 0.2);
        }

        .brand-badge svg {
            width: 40px;
            height: 40px;
            stroke: #2d6a4f;
            stroke-width: 1.7;
        }

        .profile-section h2 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1e462e;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #6c8b74;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Form Section */
        .form-section {
            padding: 0.8rem 2rem 1.8rem 2rem;
        }

        /* Role Tabs - Light Professional */
        .role-tabs-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #2d6a4f;
            margin-bottom: 0.6rem;
            display: block;
        }

        .role-tabs {
            display: flex;
            gap: 0.75rem;
            background: #f0f4f1;
            border-radius: 60px;
            padding: 0.3rem;
            margin-bottom: 1.8rem;
        }

        .role-tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.65rem 0;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 60px;
            color: #4a6b55;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .role-tab.active {
            background: #2d6a4f;
            color: white;
            box-shadow: 0 2px 8px rgba(45, 106, 79, 0.25);
        }

        /* Input Groups - Clean Light */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #3d5a4a;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .input-icon svg {
            width: 18px;
            height: 18px;
            stroke: #8aa79a;
        }

        .input-wrapper input {
            width: 100%;
            background: #ffffff;
            border: 1px solid #dce5e0;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border-radius: 16px;
            font-size: 0.95rem;
            color: #1e3a2f;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Inter', monospace;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.12);
            background: #ffffff;
        }

        .input-wrapper input::placeholder {
            color: #b8cfc2;
            font-weight: 400;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            background: linear-gradient(100deg, #2d6a4f, #1e5a3e);
            border: none;
            padding: 0.95rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.2);
        }

        .login-btn:hover {
            background: linear-gradient(100deg, #1e5a3e, #134b33);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(45, 106, 79, 0.25);
        }

        #error {
            background: rgba(220, 38, 38, 0.08);
            border-left: 3px solid #ef4444;
            padding: 0.7rem;
            border-radius: 14px;
            font-size: 0.75rem;
            color: #b91c1c;
            text-align: center;
            display: none;
            margin-top: 1rem;
        }

        /* Footer Links - Light Professional */
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 1rem 2rem 1.6rem;
            border-top: 1px solid #e2ece6;
            font-size: 0.7rem;
        }

        .footer-links a {
            color: #6c8b74;
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 500;
        }

        .footer-links a:hover {
            color: #2d6a4f;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .card-container {
                margin: 0.5rem;
            }
            .form-section {
                padding: 0.5rem 1.5rem 1.5rem;
            }
            .profile-section h2 {
                font-size: 1.4rem;
            }
            .footer-links {
                gap: 1rem;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <div class="bg-decorations">
        <div class="circle-shape circle-1"></div>
        <div class="circle-shape circle-2"></div>
    </div>

    <div class="card-container">
        <!-- SPCET Portal Header - Clean Light -->
        <div class="portal-header">
            <h1>SPCET <span>PORTAL</span></h1>
            <p>St. Peter's College of Engineering and Technology</p>
        </div>

        <div class="profile-section">
            <div class="brand-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
                </svg>
            </div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Access your academic dashboard securely</p>
        </div>

        <div class="form-section">
            <label class="role-tabs-label">Login as</label>
            <div class="role-tabs">
                <button type="button" class="role-tab active" data-role="student" onclick="selectRole('student')">Student</button>
                <button type="button" class="role-tab" data-role="admin" onclick="selectRole('admin')">Admin</button>
                <button type="button" class="role-tab" data-role="hod" onclick="selectRole('hod')">HOD</button>
            </div>
            <input type="hidden" id="role" value="student">

            <div class="input-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <input id="username" type="text" placeholder="Enter your username">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <input id="password" type="password" placeholder="Enter your password">
                </div>
            </div>

            <!-- Forgot Password link removed as requested -->

            <button class="login-btn" onclick="login()">
                <span>Sign In</span>
                <i class="fas fa-arrow-right"></i>
            </button>
            
            <p id="error"></p>
        </div>

        <div class="footer-links">
            <a href="#"><i class="fas fa-headset"></i> Help Desk</a>
            <span class="footer-divider">|</span>
            <a href="#"><i class="fas fa-shield-alt"></i> Privacy</a>
            <span class="footer-divider">|</span>
            <a href="#"><i class="fas fa-envelope"></i> Support</a>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // Demo credentials storage
        const userCredentials = {
            student: { username: "student", password: "123", role: "student" },
            admin: { username: "admin", password: "admin123", role: "admin" },
            hod: { username: "hod", password: "hod123", role: "hod" }
        };

        // Role selection handler
        function selectRole(role) {
            document.querySelectorAll('.role-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            const activeTab = document.querySelector(`.role-tab[data-role="${role}"]`);
            if (activeTab) activeTab.classList.add('active');
            document.getElementById('role').value = role;
        }

        // Professional login handler
        async function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;
            const errorEl = document.getElementById("error");

            // Clear previous error
            errorEl.innerText = "";
            errorEl.style.display = "none";

            // Validation
            if (!username || !password) {
                errorEl.innerText = "Please enter both username and password";
                errorEl.style.display = "block";
                return;
            }

            // Student authentication flow
            if (role === "student") {
                try {
                    const registeredStudent = await apiLoginStudent(username, password);
                    localStorage.setItem("currentStudent", JSON.stringify(registeredStudent));
                    localStorage.setItem("user", JSON.stringify({ role: "student", name: registeredStudent.name }));
                    redirectToDashboard("student");
                    return;
                } catch (err) {
                    console.warn("Backend student login failed:", err.message);
                    // Fallback to default demo credentials
                    const cred = userCredentials[role];
                    if (cred && cred.username === username && cred.password === password) {
                        localStorage.removeItem("currentStudent");
                        localStorage.setItem("user", JSON.stringify({ role: "student", name: "Guest Student" }));
                        redirectToDashboard("student");
                        return;
                    }
                    errorEl.innerText = "Invalid student credentials. Please register first or use default credentials.";
                    errorEl.style.display = "block";
                    return;
                }
            }

            // Admin and HOD authentication flow
            const cred = userCredentials[role];
            if (cred && cred.username === username && cred.password === password && cred.role === role) {
                if (role === "admin") {
                    const adminProfile = {
                        name: "Dr. Meera Krishnamoorthy",
                        role: "System Administrator",
                        department: "Central Administration",
                        lastLogin: new Date().toLocaleString()
                    };
                    localStorage.setItem("user", JSON.stringify({ role: "admin", adminData: adminProfile }));
                    redirectToDashboard("admin");
                } 
                else if (role === "hod") {
                    const hodProfile = {
                        name: "Prof. Ramesh Iyer",
                        department: "Electronics & Communication Engineering",
                        hodCode: "ECE-HOD",
                        cabin: "Block A - 3rd Floor"
                    };
                    localStorage.setItem("user", JSON.stringify({ role: "hod", hodDetails: hodProfile }));
                    redirectToDashboard("hod");
                }
            } else {
                errorEl.innerText = "Invalid credentials. Please try again.";
                errorEl.style.display = "block";
            }
        }

        // Redirect to respective dashboard with smooth transition
        function redirectToDashboard(role) {
            // Add visual feedback before redirect
            const btn = document.querySelector('.login-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Redirecting...';
            btn.disabled = true;
            
            setTimeout(() => {
                if (role === "student") {
                    window.location.href = "studentdonly.html";
                } else if (role === "admin") {
                    window.location.href = "faculty.html";
                } else if (role === "hod") {
                    window.location.href = "hod-portal.html";
                }
                
                // Fallback notification if dashboard files not found (development convenience)
                setTimeout(() => {
                    if (window.location.pathname.includes("login") || document.title.includes("SPCET")) {
                        console.warn("Dashboard files not detected. Please ensure studentdonly.html, faculty.html, hod-portal.html exist.");
                        btn.innerHTML = originalHTML;
                        btn.disabled = false;
                    }
                }, 300);
            }, 400);
        }

        // Enter key support for better UX
        function setupEnterKeyListener() {
            const usernameInput = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            
            const handleEnter = (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    login();
                }
            };
            
            if (usernameInput) usernameInput.addEventListener("keypress", handleEnter);
            if (passwordInput) passwordInput.addEventListener("keypress", handleEnter);
        }

        // Clear error on focus
        function setupErrorClear() {
            const inputs = ['username', 'password'];
            inputs.forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('focus', () => {
                        const errorEl = document.getElementById("error");
                        errorEl.style.display = "none";
                    });
                }
            });
        }

        // Initialize on page load
        document.addEventListener("DOMContentLoaded", async () => {
            selectRole("student");
            setupEnterKeyListener();
            setupErrorClear();
            if (typeof initAPI === 'function') {
                await initAPI();
            }
        });

        // Expose functions globally for inline onclick handlers
        window.selectRole = selectRole;
        window.login = login;
    </script>
</body>
</html>
