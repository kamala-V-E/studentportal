<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        .header {
            padding: 20px;
        }
        .header img {
            width: 1100px;
            height: 15vh;
        }
        .event-section {
            position: relative;
            width: 100%;
            height: 80vh;
            background: url('college.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .event-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .event-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .btn {
            padding: 18px 35px;
            font-size: 20px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease-in-out;
        }
        .btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="clg-logo.png" alt="College Logo">
    </div>
    <div class="event-section">
        <div class="event-box">
            <div class="event-title">Management Event</div>
            <button class="btn" onclick="location.href='login.html'">Get Started</button>

        </div>
    </div>
</body>
</html>
